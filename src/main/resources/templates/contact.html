    <link rel="stylesheet" th:href="@{/style.css}">

</head>
<body>
<header class="header">
    <a href="#" class="logo"><span>Mostofa Mohi Uddin Ahmed</span></a>


    <ul class="nav-links">
        <li><a th:href="@{/}">About</a></li>
        <li><a th:href="@{/experience}">Experience</a></li>
        <li><a th:href="@{/skills}">Skills</a></li>
        <li><a th:href="@{/projects}">Projects</a></li>
        <li><a th:href="@{/contact}">Contact</a></li>

    <i class="fa-solid fa-bars" id="menu-icon"></i>

    <a href="https://github.com/mohi-ahmed" target="_blank" class="visit-btn">Visit Github</a>
</header>


<section class="contact" id="contact">
    <div class="input-box">
        <h2 class="section-title">Contact Me</h2>

        <form id="contactForm" class="contact-form" th:action="@{/contact-form}" method = "post">
            <input type="hidden" name="access_key" value="eebe8fbf-ecb1-4735-a25e-c1b3b4d9a67e">

            <div class="input">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="name" placeholder="Your Name" required>
            </div>

            <div class="input">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" name="email" placeholder="example@email.com" required>
            </div>

            <div class="input textarea-wrap">
                <i class="fa-solid fa-message"></i>
                <textarea name="message" placeholder="Your message" required rows="4"></textarea>
            </div>

            <button type="submit" class="btn submit-btn">Submit</button>
            <p id="formResult"></p>
        </form>
    </div>
</section>
