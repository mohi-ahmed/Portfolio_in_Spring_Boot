<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
<header class="header">
    <a href="#" class="logo"><span>Mostofa Mohi Uddin Ahmed</span></a>


    <ul class="nav-links">
        <li><a th:href="@{/}">About</a></li>
        <li><a th:href="@{/experience}">Experience</a></li>
        <li><a th:href="@{/skills}">Skills</a></li>
        <li><a th:href="@{/projects}">Projects</a></li>
        <li><a th:href="@{/contact}">Contact</a></li>
    </ul>

    <i class="fa-solid fa-bars" id="menu-icon"></i>

    <a href="https://github.com/mohi-ahmed" target="_blank" class="visit-btn">Visit Github</a>
</header>


<section class="contact" id="contact">
    <div class="input-box">
        <h2 class="section-title">Contact Me</h2>

        <form id="contactForm" class="contact-form" th:action="@{/contact-form}" method = "post">

            <div class="input">
                <i class="fa-solid fa-user"></i>
                <input type="text" name="name" placeholder="Your Name" required>
            </div>

            <div class="input">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" name="email" placeholder="example@email.com" required>
            </div>

            <div class="input textarea-wrap">
                <i class="fa-solid fa-message"></i>
                <textarea name="message" placeholder="Your message" required rows="4"></textarea>
            </div>

            <button type="submit" class="btn submit-btn">Submit</button>
        </form>

        <p id="formResultSuccess" class="success" th:if="${param.sent != null and param.sent[0] == 'true'}">
            Message sent successfully!
        </p>
        <p id="formResultError" class="error" th:if="${param.sent != null and param.sent[0] == 'false'}">
            Something went wrong: <span th:text="${errorMessage != null ? errorMessage : 'Please try again or email me directly.'}"></span>
        </p>
    </div>
</section>

<footer>

    <ul class="nav-links">
        <li><a href="index.html">About</a></li>
        <li><a href="experience.html">Experience</a></li>
        <li><a href="skills.html">Skills</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>

    <p class="copyright">© All Rights Reserved | Mostofa Mohi Uddin Ahmed | mohiahmed931@gmail.com</p>

</footer>

</body>
</html>
