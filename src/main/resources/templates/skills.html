<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Skills</title>
    <link rel="stylesheet" th:href="@{/style.css}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
<header class="header">
    <a href="#" class="logo"><span>Mostofa Mohi Uddin Ahmed</span></a>



    <ul class="nav-links">
        <li><a th:href="@{/}">About</a></li>
        <li><a th:href="@{/experience}">Experience</a></li>
        <li><a th:href="@{/skills}">Skills</a></li>
        <li><a th:href="@{/projects}">Projects</a></li>
        <li><a th:href="@{/contact}">Contact</a></li>
    </ul>
    <i class="fa-solid fa-bars" id="menu-icon"></i>

    <a href="https://github.com/mohi-ahmed" target="_blank" class="visit-btn">Visit Github</a>
</header>

<section id="skills" class="skills">

    <h2 class="section-title">Skills</h2>

    <div class="skills-grid">

        <div class="skill-card">
            <i class="fa-brands fa-html5"></i>
            <h3>HTML & CSS</h3>
            <div class="skill-bar">
                <div class="skill-level" style="width: 90%;"></div>
            </div>
        </div>

        <div class="skill-card">
            <i class="fa-brands fa-js"></i>
            <h3>JavaScript</h3>
            <div class="skill-bar">
                <div class="skill-level" style="width: 85%;"></div>
            </div>
        </div>

        <div class="skill-card">
            <i class="fa-brands fa-react"></i>
            <h3>React</h3>
            <div class="skill-bar">
                <div class="skill-level" style="width: 75%;"></div>
            </div>
        </div>

        <div class="skill-card">
            <i class="fa-brands fa-node-js"></i>
            <h3>Node.js</h3>
            <div class="skill-bar">
                <div class="skill-level" style="width: 70%;"></div>
            </div>
        </div>

        <div class="skill-card">
            <i class="fa-solid fa-figma"></i>
            <h3>UI/UX Design</h3>
            <div class="skill-bar">
                <div class="skill-level" style="width: 80%;"></div>
            </div>
        </div>

    </div>
</section>

<script th:src="@{/script.js}"></script>

</body>
</html>
